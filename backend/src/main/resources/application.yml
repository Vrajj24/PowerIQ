spring:
  application:
    name: PowerIQ-Backend
    
  datasource:
    url: ${DB_URL:jdbc:h2:file:./data/poweriqdb;DB_CLOSE_DELAY=-1}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080
